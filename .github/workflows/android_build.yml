name: Build Android APK

on:
  push:
    branches:
      - main
      - master

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: "TIME TICK"

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          relative-path: "."

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'npm'
          cache-dependency-path: "TIME TICK/package-lock.json"

      - name: Install Web Dependencies
        run: npm install

      - name: Build Web Project
        run: npm run build

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Install Capacitor CLI
        run: npm install @capacitor/cli @capacitor/core @capacitor/android

      - name: Sync Capacitor
        run: npx cap sync android

      - name: Build Android APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleDebug

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: time-tick-app-debug
          path: "TIME TICK/android/app/build/outputs/apk/debug/app-debug.apk"
